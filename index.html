/* ============================================================
   Puzzle Garden — shared styles
   Cozy picture-book identity: warm eggshell ground, chunky
   rounded shapes, pastel garden accents, large friendly type.
   All components style through tokens; themes redefine tokens.
   ============================================================ */

:root {
  color-scheme: light dark;
  --text-scale: 1;

  /* ground + ink */
  --paper: #FBF5E9;
  --card: #FFFFFF;
  --card-soft: #FFFDF7;
  --ink: #46392E;
  --soft: #79695A;
  --line: #E9DCC3;
  --shadow: 0 6px 18px rgba(94, 72, 45, 0.10);

  /* garden accents (pastel fills) */
  --leaf: #8FC79A;
  --petal: #F4AFC0;
  --sky: #93C6E8;
  --butter: #F8CD74;
  --lilac: #C3B1E6;
  --coral: #F4A98E;

  /* deep partners (readable on paper, used for text/lines/icons) */
  --leaf-deep: #337146;
  --petal-deep: #AF4A68;
  --sky-deep: #2F6E9E;
  --butter-deep: #8F6404;
  --lilac-deep: #6B4FA5;
  --coral-deep: #AF5330;

  --glow: #FFF3C9; /* highlight for lit / active tiles */

  --font: ui-rounded, "SF Pro Rounded", "Avenir Next Rounded", "Nunito",
          "Arial Rounded MT Bold", "Trebuchet MS", -apple-system,
          BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --radius-lg: 28px;
  --radius-md: 18px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --paper: #2A241D;
    --card: #383127;
    --card-soft: #332D24;
    --ink: #F4EBDC;
    --soft: #BFB09D;
    --line: #4C4335;
    --shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    --leaf-deep: #A5DBB2;
    --petal-deep: #F5B9C8;
    --sky-deep: #A8D2EE;
    --butter-deep: #F3CE82;
    --lilac-deep: #CDBCEE;
    --coral-deep: #F5B49D;
    --glow: #5C5133;
  }
}
:root[data-theme="light"] {
  --paper: #FBF5E9; --card: #FFFFFF; --card-soft: #FFFDF7;
  --ink: #46392E; --soft: #79695A; --line: #E9DCC3;
  --shadow: 0 6px 18px rgba(94, 72, 45, 0.10);
  --leaf-deep: #337146; --petal-deep: #AF4A68; --sky-deep: #2F6E9E;
  --butter-deep: #8F6404; --lilac-deep: #6B4FA5; --coral-deep: #AF5330;
  --glow: #FFF3C9;
}
:root[data-theme="dark"] {
  --paper: #2A241D; --card: #383127; --card-soft: #332D24;
  --ink: #F4EBDC; --soft: #BFB09D; --line: #4C4335;
  --shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  --leaf-deep: #A5DBB2; --petal-deep: #F5B9C8; --sky-deep: #A8D2EE;
  --butter-deep: #F3CE82; --lilac-deep: #CDBCEE; --coral-deep: #F5B49D;
  --glow: #5C5133;
}

/* rounded CJK faces when the app is in Chinese */
:root[lang="zh-Hans"] {
  --font: ui-rounded, "Yuanti SC", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans CJK SC",
          "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI",
          system-ui, sans-serif;
}
/* touch-action: manipulation kills iOS double-tap-to-zoom everywhere while
   keeping pinch-zoom + scroll; drag/swipe boards override to `none` (higher
   specificity), so this base never steals their gestures. */
* { box-sizing: border-box; touch-action: manipulation; }

html {
  /* Keep the deliberately large 20px base. The user control changes the
     custom property instead of replacing this declaration with the browser's
     much smaller `100%` default. */
  font-size: calc(20px * var(--text-scale));
  line-height: 1.5;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  /* stop the browser's swipe-to-navigate and pull-to-refresh, so a swipe
     over the board stays in the game instead of leaving the page */
  overscroll-behavior: none;
}

body {
  margin: 0;
  font-family: var(--font);
  color: var(--ink);
  background:
    radial-gradient(circle at 12% 8%, color-mix(in srgb, var(--leaf) 14%, transparent) 0 140px, transparent 160px),
    radial-gradient(circle at 90% 20%, color-mix(in srgb, var(--petal) 12%, transparent) 0 120px, transparent 140px),
    radial-gradient(circle at 80% 92%, color-mix(in srgb, var(--sky) 12%, transparent) 0 150px, transparent 170px),
    var(--paper);
  background-attachment: fixed;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;   /* no long-press callout/magnifier on emoji */
  user-select: none;
  -webkit-user-select: none;     /* no selection-magnifier zoom on iOS */
}

#app {
  max-width: 590px;
  margin: 0 auto;
  padding: clamp(12px, 3vw, 24px) clamp(12px, 3vw, 20px) 60px;
}

h1, h2, h3 { margin: 0; text-wrap: balance; }

button {
  font-family: inherit;
  color: inherit;
}

.screen-title:focus { outline: none; }

:focus-visible {
  outline: 3px solid var(--sky-deep);
  outline-offset: 2px;
  border-radius: 8px;
}

/* ---------- big friendly button ---------- */
.pg-btn {
  min-height: 58px;
  padding: 10px 24px;
  border-radius: 999px;
  border: 2px solid var(--line);
  background: var(--card);
  color: var(--ink);
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--line);
  transition: transform 0.08s ease, box-shadow 0.08s ease;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.pg-btn:active { transform: translateY(2px) scale(0.98); box-shadow: 0 1px 0 var(--line); }
.pg-btn.primary {
  background: var(--leaf-deep);
  border-color: var(--leaf-deep);
  color: var(--paper);
  box-shadow: 0 3px 0 color-mix(in srgb, var(--leaf-deep) 60%, black);
}
.pg-btn.quiet {
  background: transparent;
  box-shadow: none;
  border-color: transparent;
  color: var(--soft);
}

/* ---------- home ---------- */
.home-head {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 4px;
  padding: 10px 0 20px;
}
.home-head .mascot { width: 108px; }
.home-head h1 {
  font-size: 1.9rem;
  letter-spacing: 0.01em;
}
.home-head .sub { margin: 0; color: var(--soft); font-size: 0.9rem; }

.toggles {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 12px;
  flex-wrap: wrap;
}
.toggles .pg-btn { min-height: 52px; font-size: 0.8rem; padding: 6px 18px; }

.continue-card {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 14px;
  width: 100%;
  margin: 0 0 18px;
  padding: 16px 20px;
  text-align: left;
  border: 2px solid var(--leaf-deep);
  border-radius: var(--radius-lg);
  background: color-mix(in srgb, var(--leaf) 28%, var(--card));
  color: var(--ink);
  box-shadow: 0 4px 0 color-mix(in srgb, var(--leaf-deep) 45%, var(--line));
  cursor: pointer;
}
.continue-card:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--line); }
.continue-card .eyebrow {
  display: block;
  margin-bottom: 3px;
  color: var(--leaf-deep);
  font-size: 0.8rem;
  font-weight: 800;
  letter-spacing: 0.02em;
}
.continue-card .continue-title { display: block; font-size: 1.05rem; font-weight: 800; }
.continue-card .continue-meta { display: block; margin-top: 2px; color: var(--soft); font-size: 0.82rem; }
.continue-card .chev { color: var(--leaf-deep); font-size: 1.5rem; font-weight: 800; }

.cards { display: grid; gap: 16px; }

.game-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  text-align: left;
  width: 100%;
  padding: 18px 20px;
  border-radius: var(--radius-lg);
  border: 2px solid var(--line);
  background: var(--card);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.1s ease;
  touch-action: manipulation;
}
.game-card:active { transform: scale(0.985); }
.game-card .badge {
  width: 66px;
  height: 66px;
  border-radius: 22px;
  display: grid;
  place-items: center;
  font-size: 34px;
  background: var(--accent, var(--leaf));
  border: 2px solid color-mix(in srgb, var(--accent, var(--leaf)) 70%, var(--ink));
}
.game-card h2 { font-size: 1.15rem; }
.game-card .tagline { margin: 3px 0 0; color: var(--soft); font-size: 0.85rem; line-height: 1.35; }
.game-card .prog {
  margin-top: 7px;
  font-size: 0.8rem;
  color: var(--soft);
  font-variant-numeric: tabular-nums;
}
.game-card .chev { font-size: 1.3rem; color: var(--soft); }

/* ---------- level select ---------- */
.screen-head {
  display: grid;
  grid-template-columns: minmax(0, auto) minmax(0, 1fr) minmax(0, auto);
  align-items: center;
  gap: 12px;
  padding: 4px 0 14px;
}
.screen-head .back-btn { max-width: 34vw; padding-inline: 18px; }
.screen-head .title { flex: 1; text-align: center; }
.screen-head .title h2 { font-size: 1.3rem; }
.screen-head .title .meta { color: var(--soft); font-size: 0.8rem; margin: 2px 0 0; }
.screen-head .spacer { width: clamp(64px, 18vw, 92px); }

.howto {
  margin: 0 auto 16px;
  max-width: 46ch;
  text-align: center;
  color: var(--soft);
  font-size: 0.9rem;
  line-height: 1.45;
}

.lvl-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  max-width: 420px;
  margin: 0 auto;
}
.lvl-btn {
  aspect-ratio: 1;
  border-radius: 24px;
  border: 2px solid var(--line);
  background: var(--card);
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--line);
  display: grid;
  place-items: center;
  transition: transform 0.08s ease;
  touch-action: manipulation;
}
.lvl-btn:active { transform: scale(0.94); }
.lvl-btn.done {
  background: color-mix(in srgb, var(--leaf) 30%, var(--card));
  border-color: var(--leaf-deep);
}
.lvl-btn.next {
  border-color: var(--butter-deep);
  background: color-mix(in srgb, var(--butter) 26%, var(--card));
}
.lvl-btn .mark { font-size: 1.5rem; line-height: 1; }
.lvl-btn .num { font-size: 0.8rem; color: var(--soft); }

/* ---------- play screen ---------- */
.mascot-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 2px 0 10px;
  min-height: 64px;
}
.mascot-row .mascot { width: 62px; flex-shrink: 0; }
.bubble {
  position: relative;
  background: var(--card);
  border: 2px solid var(--line);
  border-radius: 18px;
  padding: 10px 16px;
  font-size: 0.85rem;
  line-height: 1.35;
  box-shadow: var(--shadow);
}
.bubble::before {
  content: "";
  position: absolute;
  left: -9px;
  top: 50%;
  width: 14px;
  height: 14px;
  background: inherit;
  border-left: 2px solid var(--line);
  border-bottom: 2px solid var(--line);
  transform: translateY(-50%) rotate(45deg);
}

.board-card {
  background: var(--card-soft);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: clamp(12px, 3vw, 20px);
  display: grid;
  place-items: center;
}
#board { width: 100%; }

#toolbar {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 16px;
}

/* base tile games may reuse */
.pg-tile {
  aspect-ratio: 1;
  border-radius: 20%;
  border: 2px solid var(--line);
  background: var(--card);
  display: grid;
  place-items: center;
  font-size: clamp(20px, 6vw, 34px);
  user-select: none;
  -webkit-user-select: none;
  transition: transform 0.08s ease, background 0.15s ease;
}

/* gentle "not quite" wiggle */
.pg-shake { animation: pg-shake 0.35s ease; }
@keyframes pg-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-3px); }
}

/* soft appear for boards/screens */
.pg-pop { animation: pg-pop 0.25s ease; }
@keyframes pg-pop {
  from { transform: scale(0.96); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ---------- win overlay ---------- */
.win-overlay {
  position: fixed;
  inset: 0;
  background: color-mix(in srgb, var(--ink) 30%, transparent);
  display: grid;
  place-items: center;
  padding: 20px;
  z-index: 40;
  animation: pg-fade 0.25s ease;
}
@keyframes pg-fade { from { opacity: 0; } to { opacity: 1; } }
.win-card {
  background: var(--card);
  border: 2px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 28px 26px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: pg-pop 0.3s ease;
}
.win-card .mascot { width: 96px; }
.win-card h2 { font-size: 1.5rem; }
.win-card p { margin: 0 0 8px; color: var(--soft); font-size: 0.9rem; }
.win-card .pg-btn { width: 100%; }

/* falling petals */
.confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 50;
}
.confetti span {
  position: absolute;
  top: -10%;
  font-size: 26px;
  animation: petal-fall linear forwards;
}
@keyframes petal-fall {
  to { transform: translateY(115vh) rotate(340deg); opacity: 0.8; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

@media (max-width: 420px) {
  #app { padding-inline: 10px; }
  .home-head { padding-top: 4px; }
  .home-head .mascot { width: 92px; }
  .toggles { gap: 8px; }
  .toggles .pg-btn { min-height: 52px; padding-inline: 14px; }
  .game-card { gap: 12px; padding: 16px; }
  .game-card .badge { width: 60px; height: 60px; border-radius: 19px; }
  .screen-head { gap: 8px; }
  .screen-head .back-btn { min-height: 52px; max-width: 31vw; padding-inline: 12px; font-size: 0.82rem; }
  .screen-head .spacer { width: 31vw; max-width: 76px; }
  .lvl-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
  .mascot-row { align-items: flex-start; }
  .bubble { padding: 10px 13px; }
}

</style>

/* ============================================================
   Puzzle Garden — app shell
   Screens: home → level select → play. Games register with
   App.registerGame(def) and render into #board via def.start().
   ============================================================ */
'use strict';

window.App = (function () {
  const games = [];
  const KEY = 'puzzle-garden-v1';

  let store;
  try { store = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) { store = {}; }
  if (!store.done) store.done = {};
  if (typeof store.sound !== 'boolean') store.sound = true;
  if (!Number.isInteger(store.scale) || store.scale < 0 || store.scale > 2) store.scale = 0;
  if (store.theme !== 'light' && store.theme !== 'dark') store.theme = null;

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(store)); } catch (e) { /* private mode: play without saving */ }
  }

  /* ---------- gentle synthesized sounds ---------- */
  let audio = null;
  function ctx() {
    if (!store.sound) return null;
    try {
      if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
      if (audio.state === 'suspended') audio.resume();
      return audio;
    } catch (e) { return null; }
  }
  function blip(freq, dur, type, vol, delay) {
    const c = ctx();
    if (!c) return;
    dur = dur || 0.09; type = type || 'sine'; vol = vol || 0.05; delay = delay || 0;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    const t = c.currentTime + delay;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    g.connect(c.destination);
    o.start(t);
    o.stop(t + dur + 0.05);
  }
  const sound = {
    tap: function () { blip(523, 0.06); },
    place: function () { blip(659, 0.09); },
    slide: function () { blip(440, 0.05); blip(587, 0.05, 'sine', 0.04, 0.05); },
    good: function () { blip(523, 0.09); blip(659, 0.1, 'sine', 0.05, 0.08); },
    bad: function () { blip(196, 0.14, 'triangle', 0.035); },
    win: function () { [523, 659, 784, 1047].forEach(function (f, i) { blip(f, 0.18, 'sine', 0.05, i * 0.12); }); }
  };

  /* ---------- mascot (Sprout the cat) ---------- */
  const MASCOT_SVG =
    '<svg viewBox="0 0 120 112" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sprout the cat">' +
    '<g stroke="#4A3A2C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M28 40 L20 14 L44 26 Z" fill="#F6EBDD"/>' +
    '<path d="M92 40 L100 14 L76 26 Z" fill="#F6EBDD"/>' +
    '<path d="M29 37 L25 22 L38 29 Z" fill="#F4AFC0" stroke="none"/>' +
    '<path d="M91 37 L95 22 L82 29 Z" fill="#F4AFC0" stroke="none"/>' +
    '<ellipse cx="60" cy="66" rx="42" ry="38" fill="#F6EBDD"/>' +
    '<path d="M60 12 q-2 -8 4 -10 M60 12 q8 -4 10 2" fill="none" stroke="#57904F"/>' +
    '<ellipse cx="52" cy="7" rx="7" ry="4.5" fill="#8FC79A" transform="rotate(-22 52 7)"/>' +
    '<ellipse cx="70" cy="8" rx="7" ry="4.5" fill="#8FC79A" transform="rotate(20 70 8)"/>' +
    '</g>' +
    '<g class="mascot-eyes" stroke="#4A3A2C" stroke-width="3.6" stroke-linecap="round" fill="none">' +
    '<path d="M40 62 q6 -8 12 0"/>' +
    '<path d="M68 62 q6 -8 12 0"/>' +
    '</g>' +
    '<path d="M56 74 q4 4 8 0" stroke="#4A3A2C" stroke-width="3" stroke-linecap="round" fill="none"/>' +
    '<ellipse cx="34" cy="74" rx="7" ry="4.5" fill="#F4AFC0" opacity="0.75"/>' +
    '<ellipse cx="86" cy="74" rx="7" ry="4.5" fill="#F4AFC0" opacity="0.75"/>' +
    '</svg>';

  /* ---------- language ---------- */
  /* Grandma-first: Simplified Chinese by default, English one 🌐 tap away. */
  const LANGS = ['zh-Hans', 'en'];
  if (LANGS.indexOf(store.lang) === -1) store.lang = null; // null = default (简体)

  function lang() { return store.lang || 'zh-Hans'; }
  function t(key, subs) {
    const dicts = window.I18N || {};
    let v = dicts[lang()] ? dicts[lang()][key] : undefined;
    if (v === undefined && dicts.en) v = dicts.en[key];
    if (v === undefined) v = key;
    if (typeof v === 'string' && subs) {
      for (const k in subs) v = v.split('{' + k + '}').join(subs[k]);
    }
    return v;
  }
  function applyLang() { document.documentElement.lang = lang(); }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  /* ---------- tiny DOM helpers ---------- */
  function el(tag, cls, text) {
    const n = document.createElement(tag);
    if (tag === 'button') n.type = 'button';
    if (cls) n.className = cls;
    if (text !== undefined && text !== null) n.textContent = text;
    return n;
  }
  function mascot(cls) {
    const d = el('div', 'mascot' + (cls ? ' ' + cls : ''));
    d.innerHTML = MASCOT_SVG;
    return d;
  }

  /* ---------- screen management ---------- */
  let cleanupFn = null;
  let hasRendered = false;
  function swap(build) {
    if (cleanupFn) { try { cleanupFn(); } catch (e) { /* ignore */ } cleanupFn = null; }
    const overlay = document.querySelector('.win-overlay');
    if (overlay) overlay.remove();
    const root = document.getElementById('app');
    root.innerHTML = '';
    root.appendChild(build());
    window.scrollTo(0, 0);
    const heading = root.querySelector('.screen-title');
    if (heading) {
      heading.setAttribute('tabindex', '-1');
      if (hasRendered) {
        try { heading.focus({ preventScroll: true }); } catch (e) { heading.focus(); }
      }
    }
    hasRendered = true;
  }

  function doneCount(g) {
    const d = store.done[g.id] || {};
    let n = 0;
    for (let i = 0; i < g.levels.length; i++) if (d[i]) n++;
    return n;
  }

  function firstUndone(g, start) {
    const done = store.done[g.id] || {};
    const from = Number.isInteger(start) ? start : 0;
    for (let i = from; i < g.levels.length; i++) if (!done[i]) return i;
    for (let i = 0; i < from; i++) if (!done[i]) return i;
    return -1;
  }

  function resumeTarget() {
    if (!store.lastGame) return null;
    const g = games.find(function (item) { return item.id === store.lastGame; });
    if (!g) return null;
    const i = firstUndone(g, store.lastLevel);
    return i >= 0 ? { game: g, level: i } : null;
  }

  function rememberPlay(g, i) {
    store.lastGame = g.id;
    store.lastLevel = i;
    save();
  }

  /* ---------- home ---------- */
  function home() {
    document.title = t('app.title');
    swap(function () {
      const frag = document.createDocumentFragment();

      const head = el('div', 'home-head pg-pop');
      head.appendChild(mascot());
      head.appendChild(el('h1', 'screen-title', t('app.title')));
      const sub = el('p', 'sub', t('app.sub'));
      head.appendChild(sub);

      const toggles = el('div', 'toggles');
      const sndBtn = el('button', 'pg-btn', store.sound ? t('ui.soundOn') : t('ui.soundOff'));
      sndBtn.setAttribute('aria-pressed', store.sound ? 'true' : 'false');
      sndBtn.addEventListener('click', function () {
        store.sound = !store.sound;
        save();
        sndBtn.textContent = store.sound ? t('ui.soundOn') : t('ui.soundOff');
        sndBtn.setAttribute('aria-pressed', store.sound ? 'true' : 'false');
        if (store.sound) sound.place();
      });
      const sizeBtn = el('button', 'pg-btn', textSizeLabel());
      sizeBtn.addEventListener('click', function () {
        store.scale = (store.scale + 1) % 3;
        save();
        applyScale();
        sizeBtn.textContent = textSizeLabel();
        sound.tap();
      });
      const themeBtn = el('button', 'pg-btn', themeLabel());
      themeBtn.addEventListener('click', function () {
        store.theme = currentThemeIsDark() ? 'light' : 'dark';
        save();
        applyTheme();
        themeBtn.textContent = themeLabel();
        sound.tap();
      });
      const langBtn = el('button', 'pg-btn', t('ui.lang'));
      langBtn.setAttribute('aria-label', 'Language / 语言');
      langBtn.addEventListener('click', function () {
        store.lang = LANGS[(LANGS.indexOf(lang()) + 1) % LANGS.length];
        save();
        applyLang();
        sound.tap();
        home();
      });
      toggles.appendChild(sndBtn);
      toggles.appendChild(sizeBtn);
      toggles.appendChild(themeBtn);
      toggles.appendChild(langBtn);
      head.appendChild(toggles);
      frag.appendChild(head);

      const resume = resumeTarget();
      if (resume) {
        const g = resume.game;
        const i = resume.level;
        const continueBtn = el('button', 'continue-card');
        continueBtn.setAttribute('aria-label', t('home.continueAria', {
          title: g.title, n: i + 1, t: g.levels.length
        }));
        const continueText = el('span');
        continueText.appendChild(el('span', 'eyebrow', t('home.continue')));
        continueText.appendChild(el('span', 'continue-title', g.emoji + ' ' + g.title));
        continueText.appendChild(el('span', 'continue-meta', t('home.continueMeta', {
          n: i + 1, t: g.levels.length
        })));
        const continueChev = el('span', 'chev', '›');
        continueChev.setAttribute('aria-hidden', 'true');
        continueBtn.appendChild(continueText);
        continueBtn.appendChild(continueChev);
        continueBtn.addEventListener('click', function () { sound.tap(); play(g, i); });
        frag.appendChild(continueBtn);
      }

      const cards = el('div', 'cards');
      games.forEach(function (g) {
        const c = el('button', 'game-card');
        c.style.setProperty('--accent', g.accent);
        const badge = el('div', 'badge', g.emoji);
        const mid = el('div');
        mid.appendChild(el('h2', null, g.title));
        mid.appendChild(el('p', 'tagline', g.tagline));
        const n = doneCount(g);
        const progressText = n === 0 ? t('home.new') : (n === g.levels.length ? t('home.allDone') : t('home.prog', { n: n, t: g.levels.length }));
        const prog = el('div', 'prog', progressText);
        mid.appendChild(prog);
        const chev = el('span', 'chev', '›');
        chev.setAttribute('aria-hidden', 'true');
        c.setAttribute('aria-label', g.title + ' — ' + g.tagline + ' — ' + progressText);
        c.appendChild(badge);
        c.appendChild(mid);
        c.appendChild(chev);
        c.addEventListener('click', function () { sound.tap(); levels(g); });
        cards.appendChild(c);
      });
      frag.appendChild(cards);
      return frag;
    });
  }

  /* ---------- level select ---------- */
  function levels(g) {
    document.title = g.title + ' — ' + t('app.title');
    swap(function () {
      const frag = document.createDocumentFragment();

      const head = el('div', 'screen-head');
      const back = el('button', 'pg-btn back-btn', t('nav.home'));
      back.addEventListener('click', function () { sound.tap(); home(); });
      const title = el('div', 'title');
      title.appendChild(el('h2', 'screen-title', g.emoji + ' ' + g.title));
      title.appendChild(el('p', 'meta', t('levels.meta', { n: doneCount(g), t: g.levels.length })));
      head.appendChild(back);
      head.appendChild(title);
      head.appendChild(el('div', 'spacer'));
      frag.appendChild(head);

      frag.appendChild(el('p', 'howto', g.howTo));

      const grid = el('div', 'lvl-grid pg-pop');
      const done = store.done[g.id] || {};
      let nextIdx = -1;
      for (let i = 0; i < g.levels.length; i++) { if (!done[i]) { nextIdx = i; break; } }
      g.levels.forEach(function (_, i) {
        const b = el('button', 'lvl-btn' + (done[i] ? ' done' : '') + (i === nextIdx ? ' next' : ''));
        if (done[i]) {
          b.appendChild(el('span', 'mark', '🌼'));
          b.appendChild(el('span', 'num', t('levels.puzzle', { n: i + 1 })));
        } else {
          b.appendChild(el('span', 'mark', String(i + 1)));
          if (i === nextIdx) b.appendChild(el('span', 'num', t('levels.next')));
        }
        b.setAttribute('aria-label', t('levels.puzzle', { n: i + 1 }) + (done[i] ? t('levels.solvedSuffix') : ''));
        b.addEventListener('click', function () { sound.tap(); play(g, i); });
        grid.appendChild(b);
      });
      frag.appendChild(grid);
      return frag;
    });
  }

  /* ---------- play ---------- */
  function play(g, i) {
    rememberPlay(g, i);
    document.title = g.title + ' · ' + t('levels.puzzle', { n: i + 1 }) + ' — ' + t('app.title');

          b.addEventListener('click', onClick);
          toolbar.appendChild(b);

        },

          if (won) return;

          if (!store.done[g.id]) store.done[g.id] = {};

  /* Keep the player in the game: all navigation here is in-app (the ‹ Home /

     them out to the previous page. Park an extra history entry and re-park it
     whenever back fires, so an accidental edge-swipe stays put. */
  function guardBack() {
    if (!window.history || !history.pushState) return;
    try { history.pushState(null, '', location.href); } catch (e) { return; }
    window.addEventListener('popstate', function () {
      try { history.pushState(null, '', location.href); } catch (e) { /* ignore */ }

    applyLang();

            cells[k] = entry;
            wrap.appendChild(c);
          }
        }
      })();
      board.appendChild(wrap);

      /* ---------- rendering ---------- */
      function addArm(way, x, y, nb) {
        if (!nb) return;
        var dx = nb[0] - x, dy = nb[1] - y;
        var dir = dy === -1 ? 'fl-n' : dy === 1 ? 'fl-s' : dx === 1 ? 'fl-e' : 'fl-w';
        way.appendChild(mk('fl-arm ' + dir));
      }

      function render() {
        for (var y = 0; y < rows; y++) {
          for (var x = 0; x < cols; x++) {
            var entry = cells[x + ',' + y];
            if (entry.rock) continue;
            var own = ownerAt(x, y);
            var ep = endpointAt(x, y);
            var cls = 'fl-cell';
            if (ep) cls += ' fl-end';
            if (own) cls += ' fl-lit';
            if ((own && own.p === active) || (ep && ep.p === active)) cls += ' fl-on';
            entry.el.className = cls;
            entry.el.setAttribute('aria-pressed', own ? 'true' : 'false');
            var pi = own ? own.p : (ep ? ep.p : -1);
            if (pi >= 0) {
              entry.el.style.setProperty('--fl-fill', pairs[pi].fill);
              entry.el.style.setProperty('--fl-deep', pairs[pi].deep);
            }
            entry.way.textContent = '';
            if (own) {
              var p = paths[own.p];
              addArm(entry.way, x, y, p[own.k - 1]);
              addArm(entry.way, x, y, p[own.k + 1]);
              entry.way.appendChild(mk('fl-core'));
              if (own.p === active && own.k === p.length - 1 && !isConnected(active)) {
                entry.way.appendChild(mk('fl-tipdot'));
              }
            }
          }
        }
      }

      /* ---------- feedback ---------- */
      function buzz(el) {
        api.sound.bad();
        el.classList.add('pg-shake');
        timer(function () { el.classList.remove('pg-shake'); }, 420);
      }
      function noteBad() {
        badTaps++;
        if (badTaps >= 3) {
          badTaps = 0;
          api.say(App.t('flow.hint.beside'));
        }
      }
      function bloomPair(i) {
        [pairs[i].a, pairs[i].b].forEach(function (c) {
          var entry = cells[c[0] + ',' + c[1]];
          if (!entry || !entry.flower) return;
          entry.flower.classList.remove('fl-bloom');
          void entry.flower.offsetWidth;
          entry.flower.classList.add('fl-bloom');
          timer(function () { entry.flower.classList.remove('fl-bloom'); }, 800);
        });
      }
      function celebrate() {
        for (var y = 0; y < rows; y++) {
          for (var x = 0; x < cols; x++) {
            cells[x + ',' + y].el.style.animationDelay = ((x + y) * 45) + 'ms';
          }
        }
        wrap.classList.add('fl-won');
      }

      function checkState() {
        var connCount = 0, covered = 0;
        for (var i = 0; i < pairs.length; i++) {
          if (isConnected(i)) connCount++;
          covered += paths[i].length;
        }
        if (connCount === pairs.length) {
          if (covered === openCount) {
            won = true;
            celebrate();
            api.win();
            return;
          }
          if (!saidSoClose) {
            saidSoClose = true;
            api.say(App.t('flow.hint.longer'));
          }
        } else {
          saidSoClose = false;
          if (api.levelIndex === 0 && connCount === 1 && !saidFirstJoin) {
            saidFirstJoin = true;
            api.say(App.t('flow.hint.otherPair'));
          } else if (pairs.length >= 3 && connCount === pairs.length - 1 && !saidAlmost) {
            saidAlmost = true;
            api.say(App.t('flow.hint.onePair'));
          }
        }
      }

      function afterChange() {
        badTaps = 0;
        render();
        checkState();
      }

      /* ---------- one shared press handler (tap and drag) ---------- */
      function pressCell(x, y, viaDrag) {
        if (won) return;
        var k = x + ',' + y;
        var entry = cells[k];
        if (!entry) return;
        if (blocked[k]) {
          if (!viaDrag) { buzz(entry.el); noteBad(); }
          return;
        }
        var ep = endpointAt(x, y);

        if (active >= 0) {
          var p = paths[active];
          var tip = p[p.length - 1];
          var inOwn = indexInPath(p, x, y);
          if (inOwn >= 0) {
            /* own path: tapping the tip is a no-op; anywhere earlier trims
               back to that tile (tapping the previous tile = one step back) */
            if (inOwn === p.length - 1) {
              if (!viaDrag) api.sound.tap();
              return;
            }
            pushHistory();
            paths[active] = p.slice(0, inOwn + 1);
            api.sound.tap();
            afterChange();
            return;
          }
          if (tip && adjacent(tip, [x, y])) {
            var mate = same(p[0], pairs[active].a) ? pairs[active].b : pairs[active].a;
            if (ep && ep.p === active && same([x, y], mate)) {
              /* reached the twin flower — connect! */
              pushHistory();
              paths[active] = p.concat([[x, y]]);
              api.sound.good();
              bloomPair(active);
              afterChange();
              return;
            }
            if (!ep && !isConnected(active)) {
              /* extend; walking onto another pair's path gently trims it */
              pushHistory();
              var other = ownerAt(x, y);
              if (other && other.p !== active) {
                paths[other.p] = paths[other.p].slice(0, other.k);
              }
              paths[active] = p.concat([[x, y]]);
              api.sound.place();
              afterChange();
              return;
            }
          }
        }

        if (ep) {
          if (ep.p === active) {
            /* the twin flower, tapped before the path reaches it */
            if (!viaDrag) {
              buzz(entry.el);
              api.say(App.t('flow.hint.reach', { icon: pairs[ep.p].icon }));
            }
            return;
          }
          if (viaDrag) return; /* don't switch pairs mid-drag */
          if (paths[ep.p].length === 0) {
            pushHistory();
            paths[ep.p] = [[x, y]];
          }
          active = ep.p;
          api.sound.tap();
          afterChange();
          return;
        }

        if (!viaDrag) {
          buzz(entry.el);
          if (active < 0 && badTaps === 0) api.say(App.t('flow.hint.tapFirst'));
          noteBad();
        }
      }

      /* ---------- input: taps and drags on the board ---------- */
      var dragging = false;
      var dragId = null;
      var lastKey = null;

      wrap.addEventListener('pointerdown', function (e) {
        if (won) return;
        e.preventDefault();
        var el = e.target && e.target.closest ? e.target.closest('.fl-cell') : null;
        if (!el) return;
        var x = +el.dataset.x, y = +el.dataset.y;
        dragging = true;
        dragId = e.pointerId;
        lastKey = x + ',' + y;
        try { wrap.setPointerCapture(e.pointerId); } catch (err) { /* ok */ }
        pressCell(x, y, false);
      });
      wrap.addEventListener('pointermove', function (e) {
        if (!dragging || e.pointerId !== dragId || won) return;
        var el = document.elementFromPoint(e.clientX, e.clientY);
        var cellEl = el && el.closest ? el.closest('.fl-cell') : null;
        if (!cellEl || cellEl.dataset.x === undefined) return;
        var k = cellEl.dataset.x + ',' + cellEl.dataset.y;
        if (k === lastKey) return;
        lastKey = k;
        pressCell(+cellEl.dataset.x, +cellEl.dataset.y, true);
      });
      function endDrag() { dragging = false; dragId = null; lastKey = null; }
      wrap.addEventListener('pointerup', endDrag);
      wrap.addEventListener('pointercancel', endDrag);
      wrap.addEventListener('keydown', function (e) {
        if ((e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar') || won) return;
        var cellEl = e.target && e.target.closest ? e.target.closest('.fl-cell') : null;
        if (!cellEl || cellEl.dataset.x === undefined || cellEl.classList.contains('fl-rock')) return;
        e.preventDefault();
        pressCell(+cellEl.dataset.x, +cellEl.dataset.y, false);
      });

      /* ---------- toolbar ---------- */
      api.button(App.t('ui.undo'), function () {
        if (won) return;
        if (!history.length) {
          api.sound.tap();
          api.say(App.t('flow.hint.undoEmpty'));
          return;
        }
        var s = history.pop();
        active = s.active;
        paths = s.paths.map(function (p) {
          return p.map(function (c) { return c.slice(); });
        });
        api.sound.tap();
        render();
      });
      api.button(App.t('ui.restart'), function () {
        if (won) return;
        var hadProgress = paths.some(function (p) { return p.length > 0; });
        paths = pairs.map(function () { return []; });
        active = -1;
        history = [];
        saidSoClose = false;
        api.sound.slide();
        if (hadProgress) api.say(App.t('flow.hint.fresh'));
        render();
      });

      /* ---------- first paint + a warm word where it helps ---------- */
      render();
      if (api.levelIndex === 0) {
        api.say(App.t('flow.hint.teach'));
      } else if (blockedCount > 0) {
        api.say(App.t('flow.hint.stone'));
      }

      return function cleanup() {
        timers.forEach(clearTimeout);
        timers.length = 0;
      };
    }
  });
})();

      var cols = level.cols;
      var rows = level.rows;
      var cells = level.cells.map(function (c) { return [c[0], c[1]]; });
      var fixedStart = level.start ? [level.start[0], level.start[1]] : null;
      var total = cells.length;

      var cellSet = {};
      cells.forEach(function (c) { cellSet[c[0] + ',' + c[1]] = true; });

      var arrows = level.arrows || {};
      var twiceSet = {};
      (level.twice || []).forEach(function (c) { twiceSet[c[0] + ',' + c[1]] = true; });

      function needOf(k) { return twiceSet[k] ? 2 : 1; }
      /* toggle rules: normal stones flip 0↔1; ‹› stones go 0→1→2,
         and stepping on a full one dims it back to 1 */
      function nextState(k, s) {
        if (twiceSet[k]) return s === 0 ? 1 : (s === 1 ? 2 : 1);
        return s === 1 ? 0 : 1;
      }
      function computeStates() {
        var st = {};
        cells.forEach(function (c) { st[c[0] + ',' + c[1]] = 0; });
        for (var i = 0; i < path.length; i++) {
          var pk = path[i];
          if (arrows[pk]) {
            /* directional stones: when LIT, any step puts them back out;
               when UNLIT, they light only if entered along the arrow */
            if (st[pk] >= 1) { st[pk] = 0; continue; }
            if (i === 0) continue;
            if (pk !== neighborKey(path[i - 1], arrows[pk])) continue;
            st[pk] = 1;
            continue;
          }
          st[pk] = nextState(pk, st[pk]);
        }
        return st;
      }
      function neighborKey(k, dir) {
        var p = parseKey(k);
        if (dir === 'N') return p[0] + ',' + (p[1] - 1);
        if (dir === 'S') return p[0] + ',' + (p[1] + 1);
        if (dir === 'E') return (p[0] + 1) + ',' + p[1];
        return (p[0] - 1) + ',' + p[1];
      }

      var stones = {};      // key -> button element
      var path = [];        // keys, in walk order
      var solved = false;
      var saidClose = false;
      var saidFirstHop = false;
      var saidComeBack = false;
      var saidToggle = false;
      var saidArrowMiss = false;
      var timers = [];
      var dragging = false;
      var lastDragKey = null;

      function later(fn, ms) { timers.push(setTimeout(fn, ms)); }
      function parseKey(k) {
        var p = k.split(',');
        return [Number(p[0]), Number(p[1])];
      }
      function adjacent(k1, k2) {
        var a = parseKey(k1);
        var b = parseKey(k2);
        return Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1]) === 1;
      }

      /* ---------- build the board ---------- */
      board.innerHTML = '';
      var grid = document.createElement('div');
      grid.className = 'st-grid';
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      grid.style.maxWidth = Math.min(464, cols * 100) + 'px';
      for (var y = 0; y < rows; y++) {
        for (var x = 0; x < cols; x++) {
          var k = x + ',' + y;
          if (cellSet[k]) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className = 'pg-tile st-stone';
            b.dataset.key = k;
            var ariaText = App.t('steps.aria.stone', { x: x + 1, y: y + 1 });
            if (arrows[k]) ariaText += App.t('steps.aria.oneWay');
            if (twiceSet[k]) ariaText += App.t('steps.aria.twiceStone');
            b.setAttribute('aria-label', ariaText);
            b.setAttribute('aria-pressed', 'false');
            var bloom = document.createElement('span');
            bloom.className = 'st-bloom';
            b.appendChild(bloom);
            if (arrows[k]) {
              var mark = document.createElement('span');
              mark.className = 'st-mark';
              var ar = document.createElement('span');
              ar.className = 'st-arrow ' + arrows[k].toLowerCase();
              ar.textContent = '→';
              mark.appendChild(ar);
              b.appendChild(mark);
            }
            if (twiceSet[k]) {
              var twin = document.createElement('span');
              twin.className = 'st-twin';
              var t1 = document.createElement('span');
              t1.textContent = '❮';
              var t2 = document.createElement('span');
              t2.textContent = '❯';
              twin.appendChild(t1);
              twin.appendChild(t2);
              b.appendChild(twin);
            }
            grid.appendChild(b);
            stones[k] = b;
          } else {
            var gap = document.createElement('div');
            gap.className = 'st-gap';
            grid.appendChild(gap);
          }
        }
      }
      board.appendChild(grid);

      /* ---------- the kitty actor: always standing on the current stone ---------- */
      grid.style.position = 'relative';
      var catEl = document.createElement('div');
      catEl.className = 'st-actor';
      catEl.textContent = '🐱';
      catEl.setAttribute('aria-hidden', 'true');
      grid.appendChild(catEl);

      function placeCat() {
        var lastK = path.length ? path[path.length - 1] : null;
        if (!lastK) { catEl.style.display = 'none'; return; }
        var st = stones[lastK];
        catEl.style.display = '';
        catEl.style.left = st.offsetLeft + 'px';
        catEl.style.top = st.offsetTop + 'px';
        catEl.style.width = st.offsetWidth + 'px';
        catEl.style.height = st.offsetHeight + 'px';
      }
      window.addEventListener('resize', placeCat);

      /* ---------- state -> screen ---------- */
      function refresh() {
        var chooseMode = path.length === 0;
        var lastK = path.length ? path[path.length - 1] : null;
        var states = computeStates();
        var lastVisit = {};
        path.forEach(function (pk, i) { lastVisit[pk] = i; });
        cells.forEach(function (c) {
          var ck = c[0] + ',' + c[1];
          var st = stones[ck];
          var v = states[ck];
          var n = needOf(ck);
          st.classList.toggle('st-lit', v >= n);
          st.classList.toggle('st-half', n === 2 && v === 1);
          st.classList.toggle('st-cur', ck === lastK);
          st.classList.toggle('st-choose', chooseMode);
          st.setAttribute('aria-pressed', v >= n ? 'true' : 'false');
          if (ck === lastK) st.setAttribute('aria-current', 'step');
          else st.removeAttribute('aria-current');
          if (v > 0) {
            st.querySelector('.st-bloom').textContent = FLOWERS[lastVisit[ck] % FLOWERS.length];
          }
          var twin = st.querySelector('.st-twin');
          if (twin) {
            twin.children[0].classList.toggle('on', v >= 1);
            twin.children[1].classList.toggle('on', v >= 2);
          }
        });
        placeCat();
      }

      function hopAnim() {
        catEl.classList.remove('st-hop');
        void catEl.offsetWidth;
        catEl.classList.add('st-hop');
        later(function () { catEl.classList.remove('st-hop'); }, 360);
      }

      /* ---------- rules ---------- */

      function encourage() {
        var states = computeStates();
        var remaining = 0;
        cells.forEach(function (c) {
          var ck = c[0] + ',' + c[1];
          if (states[ck] !== needOf(ck)) remaining++;
        });
        if (api.levelIndex === 0 && path.length === 2 && !saidFirstHop) {
          saidFirstHop = true;
          api.say(App.t('steps.msg.firstHop'));
        } else if (remaining === 2 && !saidClose) {
          saidClose = true;
          api.say(App.t('steps.msg.twoLeft'));
        }
      }

      function celebrate() {
        grid.classList.add('st-won');
        path.forEach(function (pk, i) {
          stones[pk].style.animationDelay = (i * 60) + 'ms';
        });
      }

      function doStep(k) {
        var before = computeStates()[k];
        path.push(k);
        var states = computeStates();
        var now = states[k];
        refresh();
        hopAnim();

        var allLit = cells.every(function (c) {
          var ck = c[0] + ',' + c[1];
          return states[ck] === needOf(ck);
        });
        if (allLit) {
          solved = true;
          celebrate();
          api.win();
          return;
        }

        if (now < before) {                // stepped a lit stone back out
          api.sound.slide();
          if (!saidToggle) {
            saidToggle = true;
            api.say(App.t('steps.msg.toggle'));
          }
        } else if (now === before) {       // inert crossing of a directional stone
          api.sound.tap();
          if (now === 0 && !saidArrowMiss) {
            saidArrowMiss = true;
            api.say(App.t('steps.msg.arrowMiss'));
          }
        } else {
          api.sound.place();
          if (twiceSet[k] && before === 0 && !saidComeBack) {
            saidComeBack = true;
            api.say(App.t('steps.msg.comeBack'));
          }
        }
        encourage();
      }

      function undoStep() {
        if (solved) return;
        var minLen = fixedStart ? 1 : 0;
        if (path.length <= minLen) {
          api.sound.tap();
          api.say(App.t('steps.msg.undoEmpty'));
          return;
        }
        path.pop();
        refresh();
        api.sound.slide();
      }

      function restart() {
        if (solved) return;
        path = fixedStart ? [fixedStart[0] + ',' + fixedStart[1]] : [];
        refresh();
        api.sound.slide();
        api.say(App.t('steps.msg.fresh'));
      }

      function tapStone(k, fromDrag) {
        if (solved || !cellSet[k]) return;

        if (path.length === 0) {           // free start: any stone at all
          path.push(k);
          refresh();
          hopAnim();
          api.sound.place();
          if (api.levelIndex === 0) {
            api.say(App.t('steps.msg.thereShe'));
          } else if (arrows[k]) {          // it will not light from a standing start
            api.say(App.t('steps.msg.arrowMiss'));
            saidArrowMiss = true;
          }
          return;
        }

        var lastK = path[path.length - 1];
        if (k === lastK) {                 // patting the kitty is always fine
          if (!fromDrag) {
            api.sound.tap();
            hopAnim();
            if (twiceSet[k] && computeStates()[k] < 2) api.say(App.t('steps.msg.comeBack'));
          }
          return;
        }

        if (adjacent(k, lastK)) {
          doStep(k);                       // always walkable; lighting rules decide the rest
          return;
        }

        if (fromDrag) return;              // drags only walk stone by stone
        api.sound.bad();
        stones[k].classList.add('pg-shake');
        later(function () { stones[k].classList.remove('pg-shake'); }, 420);
        api.say(App.t('steps.msg.adjacent'));
      }

      /* ---------- input: taps, drags, keyboard ---------- */
      function onPointerDown(e) {
        dragging = true;
        try { grid.setPointerCapture(e.pointerId); } catch (err) { /* ok */ }
        var st = e.target && e.target.closest ? e.target.closest('.st-stone') : null;
        if (st && st.dataset.key) {
          lastDragKey = st.dataset.key;
          tapStone(st.dataset.key, false);
        } else {
          lastDragKey = null;
        }
      }
      function onPointerMove(e) {
        if (!dragging || solved) return;
        var elx = document.elementFromPoint(e.clientX, e.clientY);
        var st = elx && elx.closest ? elx.closest('.st-stone') : null;
        if (!st || !st.dataset.key) return;
        var k = st.dataset.key;
        if (k === lastDragKey) return;
        lastDragKey = k;
        tapStone(k, true);
      }
      function endDrag() { dragging = false; lastDragKey = null; }
      function onKeyDown(e) {
        if (e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar') return;
        var st = e.target && e.target.closest ? e.target.closest('.st-stone') : null;
        if (st && st.dataset.key) {
          e.preventDefault();
          tapStone(st.dataset.key, false);
        }
      }
      grid.addEventListener('pointerdown', onPointerDown);
      grid.addEventListener('pointermove', onPointerMove);
      grid.addEventListener('pointerup', endDrag);
      grid.addEventListener('pointercancel', endDrag);
      grid.addEventListener('keydown', onKeyDown);

      /* ---------- toolbar ---------- */
      api.button(App.t('ui.undo'), undoStep);
      api.button(App.t('ui.restart'), restart);

      /* ---------- go ---------- */
      path = fixedStart ? [fixedStart[0] + ',' + fixedStart[1]] : [];
      refresh();
      if (api.levelIndex === 0) {
        api.say(App.t('steps.msg.anyStone'));
      } else if (api.levelIndex === 2) {
        api.say(App.t('steps.msg.arrowIntro'));
      } else if (api.levelIndex === 5) {
        api.say(App.t('steps.msg.twiceIntro'));
      } else if (fixedStart && api.levelIndex === 7) {
        api.say(App.t('steps.msg.ownSpot'));
      }

      return function cleanup() {
        timers.forEach(clearTimeout);
        window.removeEventListener('resize', placeCat);
      };
    }
  });
})();

   Tap two slabs to swap them until the golden wire runs
   unbroken from the sun stone ☀️ to every lantern 🏮.

   Level data is the SOLVED arrangement; the game scrambles it
   at load with `shuffles` random swaps among unlocked cells.

   Conventions used by this file (and its level data):
   - `grid` is row-major, length cols*rows; null = hole (not
     part of the board, never rendered, never swapped).
   - `c` is the tile's openings, a subset of 'NESW'
     (N = up / row-1, E = right / col+1, S = down, W = left).
   - `locked` entries are [col, row] pairs — cells that cannot
     be swapped (anchors; the source is always locked here).
   - Solved-state invariants (verification): exactly one
     'source', at least one 'lamp', every opening meets a
     matching opening on its neighbor (none faces a wall, hole
     or board edge), and all non-null cells form ONE connected
     network. The game recomputes the win itself, so any valid
     arrangement counts, not only the stored one.

      cols: 5, rows: 4,
      grid: [
        null, { c: 'E', kind: 'lamp' }, { c: 'ESW', kind: 'wire' }, { c: 'W', kind: 'lamp' }, null,
        { c: 'ES', kind: 'wire' }, { c: 'EW', kind: 'wire' }, { c: 'NESW', kind: 'source' }, { c: 'EW', kind: 'wire' }, { c: 'SW', kind: 'wire' },
        { c: 'NE', kind: 'lamp' }, { c: 'SW', kind: 'wire' }, { c: 'NS', kind: 'wire' }, { c: 'ES', kind: 'wire' }, { c: 'NW', kind: 'lamp' },
        null, { c: 'NE', kind: 'wire' }, { c: 'NEW', kind: 'wire' }, { c: 'NW', kind: 'wire' }, null
      ],
      locked: [[2, 1], [2, 3]],
      shuffles: 9
    },

    /* L8 · 5×5 with four corner holes — the lantern festival: a ring
       around the sun, six lanterns all around. shuffles 10.
       col→    0      1      2      3      4
       row 0   ·     🏮ES    EW    🏮SW    ·
       row 1  🏮S     NES    ESW    NSW   🏮S
       row 2   NS     NES   ☀NESW   NSW    NS
       row 3   NE     NEW    NESW   NEW    NW
       row 4   ·     🏮E     NEW   🏮W     ·    */
    {
      cols: 5, rows: 5,
      grid: [
        null, { c: 'ES', kind: 'lamp' }, { c: 'EW', kind: 'wire' }, { c: 'SW', kind: 'lamp' }, null,
        { c: 'S', kind: 'lamp' }, { c: 'NES', kind: 'wire' }, { c: 'ESW', kind: 'wire' }, { c: 'NSW', kind: 'wire' }, { c: 'S', kind: 'lamp' },
        { c: 'NS', kind: 'wire' }, { c: 'NES', kind: 'wire' }, { c: 'NESW', kind: 'source' }, { c: 'NSW', kind: 'wire' }, { c: 'NS', kind: 'wire' },
        { c: 'NE', kind: 'wire' }, { c: 'NEW', kind: 'wire' }, { c: 'NESW', kind: 'wire' }, { c: 'NEW', kind: 'wire' }, { c: 'NW', kind: 'wire' },
        null, { c: 'E', kind: 'lamp' }, { c: 'NEW', kind: 'wire' }, { c: 'W', kind: 'lamp' }, null
      ],
      locked: [[2, 2], [2, 0], [2, 4]],
      shuffles: 10
    }
  ];

  /* ============================================================
     Game
     ============================================================ */
  function start(board, levelDef, api) {
    injectCss();

    var level = JSON.parse(JSON.stringify(levelDef)); // never mutate registry data
    var cols = level.cols;
    var rows = level.rows;

    var total = 0;
    var solvedTiles = level.grid.map(function (cell) {
      if (!cell) return null;
      total++;
      return { c: cell.c, kind: cell.kind };
    });

    var lockedSet = {};
    (level.locked || []).forEach(function (p) {
      lockedSet[p[1] * cols + p[0]] = true;    // p = [col, row]
    });

    var tiles = [];       // current arrangement (same holes as solvedTiles)
    var initialTiles = []; // exact opening layout restored by Start over
    var cellEls = [];     // <button> per index, null for holes
    var sel = -1;         // lifted slab index, -1 = none
    var busy = false;     // true while a swap animates
    var solvedFlag = false;
    var history = [];     // stack of [i, j] swaps for Undo
    var prevLit = {};     // lamp indices lit at last paint (for pop-on-light)
    var maxPowered = 0;
    var quietSwaps = 0;   // swaps since the golden line last grew
    var saidStuck = false;
    var saidClose = false;
    var saidAllLit = false;
    var timeouts = [];

    function later(fn, ms) {
      var id = setTimeout(fn, ms);
      timeouts.push(id);
      return id;
    }

    function copyTiles(source) {
      return source.map(function (tile) {
        return tile ? { c: tile.c, kind: tile.kind } : null;
      });
    }

    /* ---------- solved / power analysis ---------- */
    function analyse() {
      var matched = true;
      var srcIdx = -1;
      var i, x, y, d, dn, nx, ny, nt;

      for (i = 0; i < tiles.length; i++) {
        if (!tiles[i]) continue;
        if (tiles[i].kind === 'source') srcIdx = i;
        x = i % cols; y = (i - x) / cols;
        for (d = 0; d < 4; d++) {
          dn = DIRS[d];
          if (tiles[i].c.indexOf(dn) === -1) continue;
          nx = x + DIR[dn].dx; ny = y + DIR[dn].dy;
          nt = (nx >= 0 && nx < cols && ny >= 0 && ny < rows) ? tiles[ny * cols + nx] : null;
          if (!nt || nt.c.indexOf(DIR[dn].opp) === -1) matched = false;
        }
      }

      var powered = {};
      if (srcIdx >= 0) {
        var stack = [srcIdx];
        powered[srcIdx] = true;
        while (stack.length) {
          var cur = stack.pop();
          var cx = cur % cols, cy = (cur - cx) / cols;
          for (d = 0; d < 4; d++) {
            dn = DIRS[d];
            if (tiles[cur].c.indexOf(dn) === -1) continue;
            nx = cx + DIR[dn].dx; ny = cy + DIR[dn].dy;
            if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
            var ni = ny * cols + nx;
            nt = tiles[ni];
            if (!nt || powered[ni]) continue;
            if (nt.c.indexOf(DIR[dn].opp) === -1) continue;   // both sides must open
            powered[ni] = true;
            stack.push(ni);
          }
        }
      }

      var poweredCount = 0, lit = 0, lamps = 0;
      for (i = 0; i < tiles.length; i++) {
        if (!tiles[i]) continue;
        if (powered[i]) poweredCount++;
        if (tiles[i].kind === 'lamp') {
          lamps++;
          if (powered[i]) lit++;
        }
      }
      return {
        matched: matched,
        powered: powered,
        poweredCount: poweredCount,
        lit: lit,
        lamps: lamps,
        solved: matched && poweredCount === total
      };
    }

    /* ---------- scramble (never leaves the board solved) ---------- */
    function scramble() {
      var unlocked = [];
      var i;
      for (i = 0; i < solvedTiles.length; i++) {
        if (solvedTiles[i] && !lockedSet[i]) unlocked.push(i);
      }
      var attempts = 0;
      do {
        tiles = solvedTiles.map(function (t) { return t ? { c: t.c, kind: t.kind } : null; });
        var swapsLeft = level.shuffles;
        var guard = 0;
        while (swapsLeft > 0 && guard < 400) {
          guard++;
          var a = unlocked[(Math.random() * unlocked.length) | 0];
          var b = unlocked[(Math.random() * unlocked.length) | 0];
          if (a === b) continue;
          // only "effective" swaps: identical slabs trading places changes nothing
          if (tiles[a].c === tiles[b].c && tiles[a].kind === tiles[b].kind) continue;
          var tmp = tiles[a]; tiles[a] = tiles[b]; tiles[b] = tmp;
          swapsLeft--;
        }
        attempts++;
      } while (analyse().solved && attempts < 30);
    }

    /* ---------- rendering ---------- */
    function svgFor(tile, on) {
      var s = '<svg class="pi-wire' + (on ? ' pi-on' : '') + '" viewBox="0 0 100 100" aria-hidden="true">';
      for (var d = 0; d < 4; d++) {
        var dn = DIRS[d];
        if (tile.c.indexOf(dn) === -1) continue;
        s += '<path d="M50 50 L' + DIR[dn].x2 + ' ' + DIR[dn].y2 + '"/>';
      }
      s += '<circle cx="50" cy="50" r="13"/></svg>';
      return s;
    }

    function label(tile, idx, on) {
      var x = idx % cols, y = (idx - x) / cols;
      var what = tile.kind === 'source' ? App.t('pipes.aria.source')
        : tile.kind === 'lamp' ? (on ? App.t('pipes.aria.lampLit') : App.t('pipes.aria.lampDim'))
          : App.t('pipes.aria.wire');
      var s = what + App.t('pipes.aria.pos', { r: y + 1, c: x + 1 });
      if (lockedSet[idx]) s += App.t('pipes.aria.moss');
      if (sel === idx) s += App.t('pipes.aria.lifted');
      return s;
    }

    function buildBoard() {
      board.className = 'pi-board';
      board.innerHTML = '';
      board.setAttribute('aria-label', App.t('pipes.aria.board'));
      board.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
      board.style.maxWidth = Math.min(470, cols * 105) + 'px';
      cellEls = [];
      for (var i = 0; i < tiles.length; i++) {
        if (!tiles[i]) {
          var hole = document.createElement('div');
          hole.className = 'pi-hole';
          board.appendChild(hole);
          cellEls.push(null);
          continue;
        }
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pi-cell';
        (function (idx) {
          btn.addEventListener('click', function () { onTap(idx); });
          attachDrag(btn, idx);
        })(i);
        var slab = document.createElement('div');
        slab.className = 'pi-slab';
        btn.appendChild(slab);
        board.appendChild(btn);
        cellEls.push(btn);
      }
    }

    function paint(f) {
      if (!f) f = analyse();
      var newLit = {};
      for (var i = 0; i < tiles.length; i++) {
        if (!cellEls[i]) continue;
        var tile = tiles[i];
        var on = !!f.powered[i];
        var slab = cellEls[i].firstChild;

        var cls = 'pi-slab';
        if (on) cls += ' pi-powered';
        if (lockedSet[i]) cls += ' pi-locked';
        if (sel === i) cls += ' pi-lifted';
        slab.className = cls;

        var html = svgFor(tile, on);
        if (tile.kind === 'source') {
          html += '<span class="pi-iconwrap"><span class="pi-icon pi-sun">☀️</span></span>';
        } else if (tile.kind === 'lamp') {
          var justLit = on && !prevLit[i];
          html += '<span class="pi-iconwrap"><span class="pi-icon ' +
            (on ? 'pi-lamp-lit' : 'pi-lamp-dim') + (justLit ? ' pi-pop' : '') +
            '">🏮</span></span>';
          if (on) newLit[i] = true;
        }
        if (lockedSet[i]) html += '<span class="pi-moss">🌿</span>';
        slab.innerHTML = html;

        cellEls[i].setAttribute('aria-pressed', sel === i ? 'true' : 'false');
        cellEls[i].setAttribute('aria-label', label(tile, i, on));
      }
      prevLit = newLit;
    }

    /* ---------- interaction ---------- */
    function shake(idx) {
      var slab = cellEls[idx].firstChild;
      slab.classList.remove('pg-shake');
      void slab.offsetWidth;                       // restart the animation
      slab.classList.add('pg-shake');
      later(function () { slab.classList.remove('pg-shake'); }, 420);
    }

    /* ---------- drag a slab onto another to swap ---------- */
    var suppressClick = false;

    function attachDrag(btn, idx) {
      btn.addEventListener('pointerdown', function (e) {
        suppressClick = false;                       /* a fresh interaction begins */
        if (solvedFlag || busy || lockedSet[idx]) return;
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        var slab = btn.firstChild;
        var sx = e.clientX, sy = e.clientY;
        var dragging = false;

        function settle() {
          slab.style.transition = 'none';
          slab.style.transform = '';
          slab.style.zIndex = '';
          slab.style.pointerEvents = '';
          void slab.offsetWidth;
          slab.style.transition = '';
        }

        function onMove(ev) {
          var dx = ev.clientX - sx, dy = ev.clientY - sy;
          if (!dragging) {
            if (dx * dx + dy * dy < 64) return;      /* ~8px before it counts as a drag */
            dragging = true;
            suppressClick = true;
            if (sel !== -1) { sel = -1; paint(); }
            btn.classList.add('pi-drag');
            slab.style.transition = 'none';
            slab.style.zIndex = '8';
            slab.style.pointerEvents = 'none';
            api.sound.tap();
          }
          slab.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(1.06)';
          if (ev.cancelable) ev.preventDefault();
        }

        function onUp(ev) {
          btn.removeEventListener('pointermove', onMove);
          btn.removeEventListener('pointerup', onUp);
          btn.removeEventListener('pointercancel', onUp);
          if (!dragging) return;                     /* plain tap → the click handler takes it */
          btn.classList.remove('pi-drag');           /* suppressClick stays set until the click
                                                        it suppresses (or the next pointerdown) */

          var target = -1;
          var under = document.elementFromPoint(ev.clientX, ev.clientY);
          while (under && under !== board && !(under.classList && under.classList.contains('pi-cell'))) {
            under = under.parentElement;
          }
          if (under && under !== board) target = cellEls.indexOf(under);

          if (target >= 0 && target !== idx && !lockedSet[target] && !busy && !solvedFlag) {
            settle();
            swapCells(idx, target, true);
          } else if (target >= 0 && target !== idx && lockedSet[target]) {
            settle();
            api.sound.bad();
            shake(target);
            api.say(pick(MOSS_MSGS()));
          } else {
            slab.style.transition = 'transform 0.18s ease';   /* glide home */
            slab.style.transform = '';
            later(settle, 200);
          }
        }

        try { btn.setPointerCapture(e.pointerId); } catch (err) { /* older browsers */ }
        btn.addEventListener('pointermove', onMove);
        btn.addEventListener('pointerup', onUp);
        btn.addEventListener('pointercancel', onUp);
      });
    }

    function onTap(idx) {
      if (suppressClick) { suppressClick = false; return; }
      if (solvedFlag || busy) return;
      if (lockedSet[idx]) {
        api.sound.bad();
        shake(idx);
        api.say(pick(MOSS_MSGS()));
        return;
      }
      if (sel === -1) { sel = idx; api.sound.tap(); paint(); return; }
      if (sel === idx) { sel = -1; api.sound.tap(); paint(); return; }
      swapCells(sel, idx, true);
    }

    function swapCells(i, j, record) {
      busy = true;
      var before = analyse();
      api.sound.slide();

      // FLIP: glide each slab to the other's spot, then swap the data
      var a = cellEls[i].firstChild;
      var b = cellEls[j].firstChild;
      var ra = cellEls[i].getBoundingClientRect();
      var rb = cellEls[j].getBoundingClientRect();
      a.style.zIndex = '6'; b.style.zIndex = '5';
      a.style.transition = 'transform 0.18s ease';
      b.style.transition = 'transform 0.18s ease';
      a.style.transform = 'translate(' + (rb.left - ra.left) + 'px,' + (rb.top - ra.top) + 'px)';
      b.style.transform = 'translate(' + (ra.left - rb.left) + 'px,' + (ra.top - rb.top) + 'px)';

      later(function () {
        a.style.transition = 'none'; b.style.transition = 'none';
        a.style.transform = ''; b.style.transform = '';
        a.style.zIndex = ''; b.style.zIndex = '';

        var tmp = tiles[i]; tiles[i] = tiles[j]; tiles[j] = tmp;
        if (record) history.push([i, j]);
        sel = -1;
        busy = false;

        var f = analyse();
        paint(f);

        void a.offsetWidth;                        // flush, then restore transitions
        a.style.transition = ''; b.style.transition = '';

        afterMove(before, f);
      }, 200);
    }

    function afterMove(before, f) {
      if (f.lit > before.lit) api.sound.good();

      if (f.solved) { celebrate(f); return; }

      if (f.poweredCount > maxPowered) { maxPowered = f.poweredCount; quietSwaps = 0; }
      else quietSwaps++;

      if (!saidAllLit && f.lamps > 1 && f.lit === f.lamps) {
        saidAllLit = true;
        api.say(App.t('pipes.msg.allLit'));
      } else if (!saidClose && total - f.poweredCount <= 2 && f.poweredCount < total) {
        saidClose = true;
        api.say(App.t('pipes.msg.close'));
      } else if (!saidStuck && quietSwaps >= 8) {
        saidStuck = true;
        api.say(App.t('pipes.msg.stuck'));
      }
    }

    function celebrate(f) {
      solvedFlag = true;
      sel = -1;
      paint(f);
      board.classList.add('pi-won');
      api.sound.good();
      later(function () { api.win(); }, 550);
    }

    function undo() {
      if (solvedFlag || busy) return;
      if (sel !== -1) { sel = -1; paint(); }
      if (!history.length) {
        api.sound.tap();
        api.say(App.t('pipes.msg.undoEmpty'));
        return;
      }
      var m = history.pop();
      swapCells(m[0], m[1], false);                // swapping back = undo
    }

    function restart() {
      if (solvedFlag || busy) return;
      api.sound.tap();
      sel = -1;
      history = [];
      prevLit = {};
      quietSwaps = 0;
      tiles = copyTiles(initialTiles);
      var f = analyse();
      maxPowered = f.poweredCount;
      paint(f);
      api.say(pick(RESTART_MSGS()));
    }

    /* ---------- go ---------- */
    scramble();
    initialTiles = copyTiles(tiles);
    buildBoard();
    var f0 = analyse();
    maxPowered = f0.poweredCount;
    paint(f0);

    if (api.levelIndex === 0) {
      api.say(App.t('pipes.msg.teach'));
    } else if (api.levelIndex === api.levelCount - 1) {
      api.say(App.t('pipes.msg.finale'));
    }

    api.button(App.t('ui.undo'), undo);
    api.button(App.t('ui.restart'), restart);

    return function cleanup() {
      timeouts.forEach(clearTimeout);
    };
  }

  App.registerGame({
    id: 'pipes',
    get title() { return App.t('pipes.title'); },
    emoji: '🏮',
    accent: 'var(--butter)',
    get tagline() { return App.t('pipes.tagline'); },
    get howTo() { return App.t('pipes.howTo'); },
    levels: LEVELS,
    start: start
  });
})();

   flower spot. Tap-only playable (big D-pad), plus arrow keys,
   swipes on the board, and tap-to-walk. Undo and Start over
   are always one tap away. No timers, no fail states.

   Level data: standard Sokoban ASCII (see DESIGN.md).
   Every level below was machine-verified: the `solution`
   string (URDL, pushes included) replays to a win, and a BFS
   solver confirmed solvability. All levels ≤ 11 pushes.
   ============================================================ */
(function () {

     Levels. Coordinates in comments are [col,row], 0-based.

    {

    {

      ],
      solution: 'ULUUURURDDDLLDLUUU'
    }
  ];

  /* ----------------------------------------------------------
     Injected styles — all classes prefixed .cr-, tokens only.

  var CSS_ID = 'crates-css';
  var CSS = [
    '.cr-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;}',
    '.cr-grid{display:grid;gap:0;width:100%;margin:0 auto;position:relative;',
