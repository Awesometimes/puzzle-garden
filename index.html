    '  animation:cr-breathe 2.8s ease-in-out infinite alternate;}',
    '@keyframes cr-breathe{from{transform:scale(1);opacity:.7}to{transform:scale(1.12);opacity:1}}',
    '.cr-actor{position:absolute;left:0;top:0;transition:transform .17s ease;',
    '  pointer-events:none;z-index:2;}',
    '.cr-cat{z-index:3;}',
    '.cr-inner{width:100%;height:100%;display:grid;place-items:center;',
    '  font-size:clamp(24px,7vw,40px);position:relative;line-height:1;}',
    '.cr-hop{animation:cr-hop .2s ease;}',
    '@keyframes cr-hop{50%{transform:translateY(-13%);}}',
    '.cr-bloom{animation:cr-bloom .5s ease;}',
    '@keyframes cr-bloom{0%{transform:scale(1)}45%{transform:scale(1.25)}100%{transform:scale(1)}}',
    '.cr-badge{position:absolute;top:-2%;right:0;font-size:48%;',
    '  transform:scale(0);transition:transform .3s ease;}',
    '.cr-on .cr-badge{transform:scale(1);}',
    '.cr-on .cr-inner{filter:drop-shadow(0 0 10px var(--glow)) drop-shadow(0 0 4px var(--butter));}',
    '.cr-solved .cr-on .cr-inner{animation:cr-bloom .55s ease;}',
    '.cr-dpad{display:grid;grid-template-columns:repeat(3,1fr);',
    '  grid-template-rows:repeat(3,1fr);gap:10px;}',
    '.cr-dbtn{min-width:64px;min-height:58px;font-size:1.35rem;padding:6px 10px;line-height:1;}',
    '.cr-dmid{display:grid;place-items:center;font-size:1.15rem;opacity:.5;}'
  ].join('\n');

  function injectCss() {
    if (document.getElementById(CSS_ID)) return;
    var s = document.createElement('style');
    s.id = CSS_ID;
    s.textContent = CSS;
    document.head.appendChild(s);
  }

  /* ---------------------------------------------------------- */
  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (tag === 'button') n.type = 'button';
    if (cls) n.className = cls;
    if (text !== undefined && text !== null) n.textContent = text;
    return n;
  }
  function key(x, y) { return x + ',' + y; }

  /* Parse ASCII map → fresh board data (level data never mutated).
     open = walkable floor inside the walls; cells outside the
     walls (reachable from the border) render as grass/empty.   */
  function parseLevel(map) {
    var rows = map.length, cols = 0, x, y;
    for (y = 0; y < rows; y++) if (map[y].length > cols) cols = map[y].length;

    var wall = {}, spot = {}, open = {}, crates = [], cat = null;
    for (y = 0; y < rows; y++) {
      for (x = 0; x < cols; x++) {
        var ch = map[y].charAt(x) || ' ';
        var k = key(x, y);
        if (ch === '#') { wall[k] = true; continue; }
        if (ch === '.' || ch === '*' || ch === '+') spot[k] = true;
        if (ch === '$' || ch === '*') crates.push([x, y]);
        if (ch === '@' || ch === '+') cat = [x, y];
      }
    }

    /* flood-fill from the border over non-wall cells = outside */
    var outside = {}, stack = [];
    function seed(sx, sy) {
      if (sx < 0 || sy < 0 || sx >= cols || sy >= rows) return;
      var k = key(sx, sy);
      if (wall[k] || outside[k]) return;
      outside[k] = true;
      stack.push([sx, sy]);
    }
    for (x = 0; x < cols; x++) { seed(x, 0); seed(x, rows - 1); }
    for (y = 0; y < rows; y++) { seed(0, y); seed(cols - 1, y); }
    while (stack.length) {
      var c = stack.pop();
      seed(c[0] + 1, c[1]); seed(c[0] - 1, c[1]);
      seed(c[0], c[1] + 1); seed(c[0], c[1] - 1);
    }
    for (y = 0; y < rows; y++) {
      for (x = 0; x < cols; x++) {
        var kk = key(x, y);
        if (!wall[kk] && !outside[kk]) open[kk] = true;
      }
    }
    return { cols: cols, rows: rows, wall: wall, spot: spot, open: open,
             outside: outside, crates: crates, cat: cat };
  }

  /* ----------------------------------------------------------
     Game
     ---------------------------------------------------------- */
  function start(board, level, api) {
    injectCss();

    var p = parseLevel(level.map);
    var init = {
      cat: p.cat.slice(),
      crates: p.crates.map(function (c) { return c.slice(); })
    };

    var cat = init.cat.slice();
    var crates = init.crates.map(function (c) { return c.slice(); });
    var history = [];
    var finished = false;
    var walkTimer = null;
    var winTimer = null;
    var teachTimer = null;
    var badStreak = 0;
    var hints = { stuck: false, corner: false, almost: false, tapCrate: false };

    /* ---------- build DOM ---------- */
    board.textContent = '';
    var wrap = el('div', 'cr-wrap');
    var grid = el('div', 'cr-grid');
    grid.setAttribute('role', 'group');
    grid.setAttribute('aria-label', App.t('crates.aria.board'));
    grid.style.gridTemplateColumns = 'repeat(' + p.cols + ', 1fr)';
    grid.style.maxWidth = Math.min(p.cols * 84, 470) + 'px';

    var x, y;
    var cellEls = {};
    for (y = 0; y < p.rows; y++) {
      for (x = 0; x < p.cols; x++) {
        var k = key(x, y);
        var cls = 'cr-cell ';
        if (p.wall[k]) cls += 'cr-wall';
        else if (p.open[k]) cls += 'cr-floor' + (p.spot[k] ? ' cr-spotcell' : '');
        else cls += 'cr-grass';
        var cell = el(p.open[k] ? 'button' : 'div', cls);
        cell.setAttribute('data-x', String(x));
        cell.setAttribute('data-y', String(y));
        if (p.open[k]) cellEls[k] = cell;
        if (p.spot[k] && p.open[k]) {
          var fl = el('span', 'cr-flower', '🌼');
          fl.setAttribute('aria-hidden', 'true');
          cell.appendChild(fl);
        }
        grid.appendChild(cell);
      }
    }

    function makeActor(cls, face, label) {
      var a = el('div', 'cr-actor ' + cls);
      a.style.width = 'calc(100% / ' + p.cols + ')';
      a.style.height = 'calc(100% / ' + p.rows + ')';
      a.setAttribute('aria-hidden', 'true');
      var inner = el('span', 'cr-inner');
      inner.appendChild(el('span', 'cr-face', face));
      a.appendChild(inner);
      grid.appendChild(a);
      return { root: a, inner: inner };
    }

    var crateEls = crates.map(function () {
      var a = makeActor('cr-crate', '📦', App.t('crates.aria.crate'));
      a.inner.appendChild(el('span', 'cr-badge', '🌼'));
      return a;
    });
    var catEl = makeActor('cr-cat', '🐱', App.t('crates.aria.cat'));

    function place(actor, pos) {
      actor.root.style.transform =
        'translate(' + (pos[0] * 100) + '%, ' + (pos[1] * 100) + '%)';
    }
    function placeAll() {
      place(catEl, cat);
      for (var i = 0; i < crates.length; i++) place(crateEls[i], crates[i]);
      refreshSpotGlow();
    }
    function refreshSpotGlow() {
      for (var i = 0; i < crates.length; i++) {
        var on = !!p.spot[key(crates[i][0], crates[i][1])];
        crateEls[i].root.classList.toggle('cr-on', on);
      }
      refreshAccessibility();
    }
    function refreshAccessibility() {
      for (var y = 0; y < p.rows; y++) {
        for (var x = 0; x < p.cols; x++) {
          var k = key(x, y);
          var cell = cellEls[k];
          if (!cell) continue;
          var ci = crateAt(x, y);
          var hasCat = cat[0] === x && cat[1] === y;
          var item = ci >= 0
            ? (p.spot[k] ? App.t('crates.aria.crateOnSpot') : App.t('crates.aria.crate'))
            : hasCat
              ? (p.spot[k] ? App.t('crates.aria.catOnSpot') : App.t('crates.aria.cat'))
              : p.spot[k] ? App.t('crates.aria.spot') : App.t('crates.aria.floor');
          cell.setAttribute('aria-label', App.t('crates.aria.cell', {
            r: y + 1, c: x + 1, item: item
          }));
          if (hasCat) cell.setAttribute('aria-current', 'true');
          else cell.removeAttribute('aria-current');
        }
      }
    }

    /* No D-pad — the cat is driven by touch: tap a tile to walk there,
       tap an adjacent crate (or swipe toward one) to push it. Arrow keys
       still work as an invisible bonus on desktop. */
    wrap.appendChild(grid);
    board.appendChild(wrap);
    placeAll();

    /* ---------- helpers ---------- */
    function crateAt(cx, cy) {
      for (var i = 0; i < crates.length; i++) {
        if (crates[i][0] === cx && crates[i][1] === cy) return i;
      }
      return -1;
    }
    function retrigger(elm, cls) {
      elm.classList.remove(cls);
      void elm.offsetWidth;
      elm.classList.add(cls);
    }
    function shake(elm) {
      retrigger(elm, 'pg-shake');
      setTimeout(function () { elm.classList.remove('pg-shake'); }, 420);
    }
    function oops(elm) {
      api.sound.bad();
      shake(elm);
      badStreak++;
      if (badStreak >= 3 && !hints.stuck) {
        hints.stuck = true;
        api.say(App.t('crates.msg.stuck'));
      }
    }
    function snapshot() {
      history.push({
        cat: cat.slice(),
        crates: crates.map(function (c) { return c.slice(); })
      });
    }
    function stopWalk() {
      if (walkTimer !== null) { clearInterval(walkTimer); walkTimer = null; }
    }
    function inCorner(cx, cy) {
      var w = p.wall;
      var lr = w[key(cx - 1, cy)] || w[key(cx + 1, cy)];
      var ud = w[key(cx, cy - 1)] || w[key(cx, cy + 1)];
      return !!(lr && ud);
    }
    function countOnSpots() {
      var n = 0;
      for (var i = 0; i < crates.length; i++) {
        if (p.spot[key(crates[i][0], crates[i][1])]) n++;
      }
      return n;
    }
    function checkWin() {
      if (finished) return;
      if (countOnSpots() !== crates.length) return;
      finished = true;
      stopWalk();
      grid.classList.add('cr-solved');
      retrigger(catEl.inner, 'cr-hop');
      winTimer = setTimeout(function () { api.win(); }, 500);
    }

    /* ---------- moving ---------- */
    function move(dx, dy) {
      if (finished) return;
      stopWalk();
      var nx = cat[0] + dx, ny = cat[1] + dy;
      var nk = key(nx, ny);

      if (!p.open[nk]) { oops(catEl.inner); return; }

      var ci = crateAt(nx, ny);
      if (ci >= 0) {
        var bx = nx + dx, by = ny + dy;
        var bk = key(bx, by);
        if (!p.open[bk] || crateAt(bx, by) >= 0) { oops(crateEls[ci].inner); return; }

        snapshot();
        badStreak = 0;
        crates[ci][0] = bx; crates[ci][1] = by;
        cat[0] = nx; cat[1] = ny;
        place(crateEls[ci], crates[ci]);
        place(catEl, cat);
        retrigger(catEl.inner, 'cr-hop');
        refreshSpotGlow();

        if (p.spot[bk]) {
          api.sound.good();
          retrigger(crateEls[ci].inner, 'cr-bloom');
          var on = countOnSpots();
          if (on < crates.length && crates.length >= 2 &&
              on === crates.length - 1 && !hints.almost) {
            hints.almost = true;
            api.say(App.t('crates.msg.oneLeft'));
          }
        } else {
          api.sound.place();
          if (!hints.corner && inCorner(bx, by)) {
            hints.corner = true;
            api.say(App.t('crates.msg.corner'));
          }
        }
        checkWin();
      } else {
        snapshot();
        badStreak = 0;
        cat[0] = nx; cat[1] = ny;
        place(catEl, cat);
        retrigger(catEl.inner, 'cr-hop');
        api.sound.tap();
      }
    }

    /* ---------- tap-to-walk ---------- */
    function findPath(tx, ty) {
      var target = key(tx, ty);
      if (!p.open[target]) return null;
      var blocked = {};
      for (var i = 0; i < crates.length; i++) blocked[key(crates[i][0], crates[i][1])] = true;
      if (blocked[target]) return null;

      var startK = key(cat[0], cat[1]);
      var prev = {};
      prev[startK] = null;
      var q = [[cat[0], cat[1]]], head = 0;
      var D = [[1, 0], [-1, 0], [0, 1], [0, -1]];
      while (head < q.length) {
        var c = q[head++];
        var ck = key(c[0], c[1]);
        if (ck === target) {
          var path = [], cur = ck;
          while (cur !== startK) {
            var parts = cur.split(',');
            path.unshift([parseInt(parts[0], 10), parseInt(parts[1], 10)]);
            cur = prev[cur];
          }
          return path;
        }
        for (var d = 0; d < 4; d++) {
          var nx = c[0] + D[d][0], ny = c[1] + D[d][1];
          var nk = key(nx, ny);
          if (!p.open[nk] || blocked[nk] || (nk in prev)) continue;
          prev[nk] = ck;
          q.push([nx, ny]);
        }
      }
      return null;
    }

    function walkStep(pos) {
      snapshot();
      badStreak = 0;
      cat[0] = pos[0]; cat[1] = pos[1];
      place(catEl, cat);
      refreshAccessibility();
      retrigger(catEl.inner, 'cr-hop');
      api.sound.tap();
    }
    function startWalk(path) {
      stopWalk();
      if (!path.length) return;
      walkStep(path[0]);
      var i = 1;
      if (i >= path.length) return;
      walkTimer = setInterval(function () {
        if (finished || i >= path.length) { stopWalk(); return; }
        walkStep(path[i]);
        i++;
        if (i >= path.length) stopWalk();
      }, 150);
    }

    function onTap(cellEl) {
      if (finished || !cellEl) return;
      var tx = parseInt(cellEl.getAttribute('data-x'), 10);
      var ty = parseInt(cellEl.getAttribute('data-y'), 10);
      var tk = key(tx, ty);
      if (!p.open[tk]) return; /* wall or grass: quiet */

      var ci = crateAt(tx, ty);
      if (ci >= 0) {
        var dx = tx - cat[0], dy = ty - cat[1];
        if (Math.abs(dx) + Math.abs(dy) === 1) {
          move(dx, dy); /* tapping a crate beside the cat pushes it */
        } else {
          api.sound.tap();
          if (!hints.tapCrate) {
            hints.tapCrate = true;
            api.say(App.t('crates.msg.pushHint'));
          }
        }
        return;
      }
      if (tx === cat[0] && ty === cat[1]) {
        retrigger(catEl.inner, 'cr-hop');
        api.sound.tap();
        return;
      }
      var path = findPath(tx, ty);
      if (path) startWalk(path);
      else oops(cellEl);
    }

    /* ---------- swipe / tap on the board ---------- */
    var press = null;
    grid.addEventListener('pointerdown', function (e) {
      if (finished) return;
      press = {
        id: e.pointerId,
        x: e.clientX,
        y: e.clientY,
        cell: e.target && e.target.closest ? e.target.closest('.cr-cell') : null
      };
      try { grid.setPointerCapture(e.pointerId); } catch (err) { /* fine without */ }
    });
    grid.addEventListener('pointerup', function (e) {
      if (!press || e.pointerId !== press.id) return;
      var dx = e.clientX - press.x;
      var dy = e.clientY - press.y;
      var cell = press.cell;
      press = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) >= 30) {
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : -1, 0);
        else move(0, dy > 0 ? 1 : -1);
      } else {
        onTap(cell);
      }
    });
    grid.addEventListener('pointercancel', function () { press = null; });
    grid.addEventListener('keydown', function (e) {
      if ((e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar') || finished) return;
      var cell = e.target && e.target.closest ? e.target.closest('.cr-cell') : null;
      if (cell) {
        e.preventDefault();
        onTap(cell);
      }
    });

    /* ---------- keyboard ---------- */
    var KEYS = {
      ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0]
    };
    function onKey(e) {
      var d = KEYS[e.key];
      if (!d) return;
      e.preventDefault();
      move(d[0], d[1]);
    }
    document.addEventListener('keydown', onKey);

    /* ---------- toolbar ---------- */
    api.button(App.t('ui.undo'), function () {
      if (finished) return;
      stopWalk();
      if (!history.length) {
        api.sound.tap();
        api.say(App.t('crates.msg.undoEmpty'));
        return;
      }
      var s = history.pop();
      cat = s.cat;
      crates = s.crates;
      badStreak = 0;
      placeAll();
      api.sound.slide();
    });
    api.button(App.t('ui.restart'), function () {
      if (finished) return;
      stopWalk();
      cat = init.cat.slice();
      crates = init.crates.map(function (c) { return c.slice(); });
      history = [];
      badStreak = 0;
      placeAll();
      api.sound.slide();
      api.say(App.t('crates.msg.fresh'));
    });

    /* ---------- a little warm welcome on the very first level ---------- */
    if (api.levelIndex === 0) {
      teachTimer = setTimeout(function () {
        api.say(App.t('crates.msg.teach'));
      }, 900);
    }

    /* ---------- cleanup ---------- */
    return function cleanup() {
      stopWalk();
      if (winTimer !== null) clearTimeout(winTimer);
      if (teachTimer !== null) clearTimeout(teachTimer);
      document.removeEventListener('keydown', onKey);
    };
  }

  App.registerGame({
    id: 'crates',
    get title() { return App.t('crates.title'); },
    emoji: '📦',
    accent: 'var(--leaf)',
    get tagline() { return App.t('crates.tagline'); },
    get howTo() { return App.t('crates.howTo'); },
    levels: LEVELS,
    start: start
  });
})();

if (document.readyState !== 'loading') {
  document.dispatchEvent(new Event('DOMContentLoaded'));
}
</script>
